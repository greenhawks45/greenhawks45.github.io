    <script>
        // Touch/mobile behavior: tap button to toggle dropdown.
        (function () {
            var touchMediaQuery = window.matchMedia('(hover: none), (pointer: coarse)');
            var dropdown = document.querySelector('.nav-dropdown');
            if (!dropdown) return;

            var button = dropdown.querySelector('.nav-dropdown-label');
            if (!button) return;

            function setOpen(isOpen) {
                dropdown.classList.toggle('is-open', isOpen);
                button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            }

            function closeIfDesktop(event) {
                if (event.matches === false) {
                    setOpen(false);
                }
            }

            button.addEventListener('click', function (event) {
                if (!touchMediaQuery.matches) return;

                event.preventDefault();
                event.stopPropagation();
                setOpen(!dropdown.classList.contains('is-open'));
            });

            document.addEventListener('click', function (event) {
                if (!touchMediaQuery.matches) return;
                if (!dropdown.contains(event.target)) {
                    setOpen(false);
                }
            });

            document.addEventListener('keydown', function (event) {
                if (event.key === 'Escape') {
                    setOpen(false);
                }
            });

            if (typeof touchMediaQuery.addEventListener === 'function') {
                touchMediaQuery.addEventListener('change', closeIfDesktop);
            } else if (typeof touchMediaQuery.addListener === 'function') {
                touchMediaQuery.addListener(closeIfDesktop);
            }
        })();
    </script>
