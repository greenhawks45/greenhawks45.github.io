<!-- main -->
    <main>
        <br>
        <h1>Redondo Union High School</h1>
        <br>

        <div id="ruhs-form">
            <h2>Student Information Form</h2>
            <p>Any fields with an asterisk * are required</p>
            <form action="#" method="post">
                <hr>

                <label for="student-first-name">*Student First Name:</label>
                <input type="text" id="student-first-name" name="studentFirstName" required>

                <label for="student-last-name">*Student Last Name:</label>
                <input type="text" id="student-last-name" name="studentLastName" required>

                <label for="student-id">*Student ID:</label>
                <input type="text" id="student-id" name="studentId" required>

                <label for="student-year">*Student Year:</label>
                <select id="student-year" name="studentYear" required>
                    <option value="">Select Year</option>
                    <option value="freshman">Freshman</option>
                    <option value="sophmore">Sophmore</option>
                    <option value="junior">Junior</option>
                    <option value="senior">Senior</option>
                </select>

                <label for="instrument-section">Instrument Section:</label>
                <select id="instrument-section" name="instrumentSection">
                    <option value="">Select Section</option>
                    <option value="battery">Battery</option>
                    <option value="front-ensemble">Front Ensemble</option>
                    <option value="not-assigned-yet">Not Assigned Yet</option>
                </select>

                <hr>

                <label for="guardian-1-first-name">*Parent/Guardian 1 First Name:</label>
                <input type="text" id="guardian-1-first-name" name="guardian1FirstName" required>

                <label for="guardian-1-last-name">*Parent/Guardian 1 Last Name:</label>
                <input type="text" id="guardian-1-last-name" name="guardian1LastName" required>

                <label for="guardian-1-phone">*Parent/Guardian 1 Phone:</label>
                <input
                    type="tel"
                    id="guardian-1-phone"
                    name="guardian1Phone"
                    inputmode="numeric"
                    pattern="[0-9]{10}"
                    maxlength="10"
                    required>

                <label for="guardian-1-email">*Parent/Guardian 1 Email:</label>
                <input type="email" id="guardian-1-email" name="guardian1Email" required>

                <label for="guardian-2-first-name">Parent/Guardian 2 First Name:</label>
                <input type="text" id="guardian-2-first-name" name="guardian2FirstName">

                <label for="guardian-2-last-name">Parent/Guardian 2 Last Name:</label>
                <input type="text" id="guardian-2-last-name" name="guardian2LastName">

                <label for="guardian-2-phone">Parent/Guardian 2 Phone:</label>
                <input
                    type="tel"
                    id="guardian-2-phone"
                    name="guardian2Phone"
                    inputmode="numeric"
                    pattern="[0-9]{10}"
                    maxlength="10">

                <label for="guardian-2-email">Parent/Guardian 2 Email:</label>
                <input type="email" id="guardian-2-email" name="guardian2Email">

                <hr>

                <label for="emergency-first-name">Emergency Contact First Name:</label>
                <input type="text" id="emergency-first-name" name="emergencyFirstName">

                <label for="emergency-last-name">Emergency Contact Last Name:</label>
                <input type="text" id="emergency-last-name" name="emergencyLastName">

                <label for="emergency-phone">Emergency Contact Phone:</label>
                <input
                    type="tel"
                    id="emergency-phone"
                    name="emergencyPhone"
                    inputmode="numeric"
                    pattern="[0-9]{10}"
                    maxlength="10">

                <hr>
                <button type="submit" class="link-style-1">Submit</button>
            </form>
        </div>
    </main>
